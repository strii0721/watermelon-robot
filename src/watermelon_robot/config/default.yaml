model: 
  name: "yolov26-best.pt"
  use_half: False
  confidence: 0.90
  iou: 0.45
  device: "0"


robotic_arm: 
  speed_rate: 70


lane_detection: 
  roi: 
    y_min: 0.5
    y_max: 0.7


######################################## 以下是节点初始化器配置 ########################################
_node_initializer:

  ##################
  # 监视器：手眼相机 #
  ##################
  MONITOR_0:

    # 标准通信接口配置块 ###################
    ##################
    input_0: "t/videostream/eye_on_hand_boxed"             # 输入：手眼相机加框画面

    # 通用配置块 ###################
    ###########
    fps: 30
    is_livestream: True
    livestream_host: "localhost"
    livestream_port: 8080

# -------------------------------------------------------

  ################
  # 中央逻辑控制器 #
  ################
  PRTS:

    # 标准通信接口配置块 ###################
    ##################
    input_0: "t/videostream/eye_on_hand/color_raw"          # 输入：手眼相机彩色原始画面
    input_1: "t/videostream/eye_on_hand/depth_raw"          # 输入：手眼相机深度原始画面
    input_2: "t/universal/eye_on_hand/camera_intrinsics"    # 输入：手眼相机内参
    input_3: "t/videostream/eye_on_wheel_raw"               # 输入：底盘相机原始画面
    output_0: "t/videostream/eye_on_hand_boxed"             # 输出：手眼相机加框画面
    output_1: "t/videostream/eye_on_wheel_predicted"        # 输出：底盘相机预测画面
    duplex_0: "s/signal/action_once"                        # 输出：机械臂控制

    # 通用配置块 ###################
    ###########
    ats:               # 近似时间同步器
      queue_size: 10    # 缓存队列大小
      slop: 0.05        # 最大时间差（秒）

# -------------------------------------------------------

  ######################
  # Realsense：手眼相机 #
  ######################
  PRIESTESS_EYES_0:

    # 标准通信接口配置块 ###################
    ##################
    output_0: "t/videostream/eye_on_hand/color_raw"         # 输出：手眼相机彩色原始画面
    output_1: "t/videostream/eye_on_hand/depth_raw"         # 输出：手眼相机深度原始画面
    output_2: "t/universal/eye_on_hand/camera_intrinsics"   # 输出：手眼相机内参

    # 通用配置块 ###################
    ###########
    fps: 30

# -------------------------------------------------------
  
  ######################
  # Realsense：底盘相机 #
  ######################
  PRIESTESS_EYES_1:

    # 标准通信接口配置块 ###################
    ##################
    output_0: "t/videostream/eye_on_wheel_raw"          # 输出：底盘相机原始画面

    # 通用配置块 ###################
    ###########